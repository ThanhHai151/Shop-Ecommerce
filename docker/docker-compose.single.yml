version: '3.8'

# Docker Compose for Single Database Mode
# Usage: docker-compose -f docker-compose.single.yml up --build

services:
  # Spring Boot Application
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: computershop-app
    ports:
      - "2345:2345"
    environment:
      - SPRING_PROFILES_ACTIVE=single
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=computershop;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - computershop-network
    restart: on-failure

  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: computershop-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./init:/init
    entrypoint: /bin/bash /init/entrypoint.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - computershop-network

# Networks
networks:
  computershop-network:
    driver: bridge

# Volumes
volumes:
  mssql-data:
