version: '3.8'

# Docker Compose for Single Database Mode
# Usage (Linux/macOS): docker compose -f docker/docker-compose.single.yml up mssql -d
#   Then run the app:  ./mvnw spring-boot:run
#
# Usage (Windows/Docker Desktop): Same commands.
#   The app connects to localhost:1433 (mapped by the `ports` section below).

services:
  # SQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: computershop-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./init:/init:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - computershop-network

# Networks
networks:
  computershop-network:
    driver: bridge

# Volumes
volumes:
  mssql-data:
