version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: computershop-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - ./database.sql:/database.sql:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: computershop-init-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    volumes:
      - ./database.sql:/database.sql:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "
      echo 'Waiting for SQL Server to be ready...' &&
      for i in {1..30}; do
        if /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' &> /dev/null; then
          echo 'SQL Server is ready!';
          break;
        fi;
        echo 'Waiting... ($i/30)';
        sleep 2;
      done &&
      echo 'Running database initialization script...' &&
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C -i /database.sql &&
      echo 'Database initialization completed successfully!' &&
      /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT name FROM sys.databases WHERE name = ''computershop'''
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: computershop-app
    ports:
      - "2345:2345"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://db:1433;databaseName=computershop;encrypt=true;trustServerCertificate=true"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "YourStrong!Passw0rd"
    depends_on:
      init-db:
        condition: service_completed_successfully
    restart: "no"
