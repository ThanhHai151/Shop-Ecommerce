# ============================================
# Distributed Database Configuration
# This file is used when running in distributed mode
# Usage: --spring.profiles.active=distributed
# ============================================

# Application Name
spring.application.name=main

# Server Configuration
server.port=2345

# ============================================
# Primary Database (DB1) - Users, Products, Categories
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=computershop_main;encrypt=true;trustServerCertificate=true
spring.datasource.username=hai
spring.datasource.password=hai
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================
# Orders Database (DB2) - Orders, Carts, Payments
# ============================================
spring.datasource.orders.url=jdbc:sqlserver://localhost:1434;databaseName=computershop_orders;encrypt=true;trustServerCertificate=true
spring.datasource.orders.username=hai
spring.datasource.orders.password=hai
spring.datasource.orders.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Thymeleaf Configuration
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Context Path
server.servlet.context-path=/

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.max-age=1800

# Payment - MoMo
payment.momo.receiver-phone=0983580550
