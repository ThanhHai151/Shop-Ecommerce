spring.application.name=main

# ============================================================
# H2 Local Development Profile
# Works on any OS (Windows, macOS, Linux) without Docker.
# Usage: ./mvnw spring-boot:run -Dspring.profiles.active=h2
# ============================================================

# Server
server.port=2345
server.servlet.context-path=/

# H2 Database - File-based (data persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/computershop;MODE=MSSQLSERVER;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, browse at http://localhost:2345/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - Update schema without dropping tables; seed SQL only on first run
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Thymeleaf
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Session
server.servlet.session.timeout=30m
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=cookie

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Error pages
server.error.include-message=always
server.error.include-stacktrace=always
server.error.include-exception=true

