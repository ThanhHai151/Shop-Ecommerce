<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu - JSB ComputerShop</title>
    <link rel="stylesheet" th:href="@{/CSS/style.css}" />
    <link rel="stylesheet" th:href="@{/CSS/header.css}" />
    <link rel="stylesheet" th:href="@{/CSS/footer.css}" />
    <link rel="stylesheet" th:href="@{/CSS/login.css}" />
</head>
<body>
    
    <div th:replace="~{header :: header}"></div>

    <main class="main-content">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h2>Đặt lại mật khẩu</h2>
                <p class="text-muted">Nhập mật khẩu mới của bạn</p>
            </div>

            <div th:if="${error}" class="error" th:text="${error}">Lỗi</div>
            <div th:if="${success}" class="success" th:text="${success}">Thành công</div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}" />
                
                <div class="form-row">
                    <label for="newPassword" class="form-label">Mật khẩu mới</label>
                    <input id="newPassword" name="newPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <div class="form-row">
                    <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <button class="btn btn-primary btn-full" type="submit">Cập nhật mật khẩu</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Quay lại đăng nhập</a></p>
            </div>
        </div>
    </main>

    
    <div th:replace="~{footer :: footer}"></div>

    <script th:src="@{/JavaScript/header.js}"></script>
    <script th:src="@{/JavaScript/main.js}"></script>
</body>
</html>
