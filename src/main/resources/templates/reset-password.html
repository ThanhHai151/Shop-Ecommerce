<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <script th:replace="~{fragments/theme-head :: earlyInit}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - ComputerShop</title>
    <link rel="stylesheet" th:href="@{/CSS/style.css}" />
    <link rel="stylesheet" th:href="@{/CSS/header.css}" />
    <link rel="stylesheet" th:href="@{/CSS/footer.css}" />
    <link rel="stylesheet" th:href="@{/CSS/login.css}" />
</head>
<body>
    
    <div th:replace="~{header :: header}"></div>

    <main class="main-content">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p class="text-muted">Enter your new password</p>
            </div>

            <div th:if="${error}" class="error" th:text="${error}">Error</div>
            <div th:if="${success}" class="success" th:text="${success}">Success</div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}" />
                
                <div class="form-row">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input id="newPassword" name="newPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <div class="form-row">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <button class="btn btn-primary btn-full" type="submit">Update Password</button>
            </form>

            <div class="auth-links">
                <p><a href="/login">Back to Login</a></p>
            </div>
        </div>
    </main>

    
    <div th:replace="~{footer :: footer}"></div>

    <script th:src="@{/JavaScript/header.js}"></script>
    <script th:src="@{/JavaScript/main.js}"></script>
</body>
</html>
