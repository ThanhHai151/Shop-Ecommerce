<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <script th:replace="~{fragments/theme-head :: earlyInit}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ComputerShop</title>
    <link rel="stylesheet" th:href="@{/CSS/style.css}" />
    <link rel="stylesheet" th:href="@{/CSS/header.css}" />
    <link rel="stylesheet" th:href="@{/CSS/footer.css}" />
    <link rel="stylesheet" th:href="@{/CSS/login.css}" />
</head>
<body>
    
    <div th:replace="~{header :: header}"></div>

    <main class="main-content">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h2>Forgot Password</h2>
                <p class="text-muted">Enter your email to reset your password</p>
            </div>

            <div th:if="${error}" class="error" th:text="${error}">Error</div>
            <div th:if="${success}" class="success">
                <p th:text="${success}">Success</p>
                <div th:if="${resetLink}" style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 6px;">
                    <p style="margin: 0 0 8px 0; font-weight: 500;">Password reset link:</p>
                    <a th:href="${resetLink}" style="color: #0b5ed7; word-break: break-all;">
                        <span th:text="${'http://localhost:8080' + resetLink}"></span>
                    </a>
                </div>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-row">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required />
                </div>

                <button class="btn btn-primary btn-full" type="submit">Reset Password</button>
            </form>

            <div class="auth-links">
                <p>Remember your password? <a href="/login">Login now</a></p>
            </div>
        </div>
    </main>

    
    <div th:replace="~{footer :: footer}"></div>

    <script th:src="@{/JavaScript/header.js}"></script>
    <script th:src="@{/JavaScript/main.js}"></script>
</body>
</html>
