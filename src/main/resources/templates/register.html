<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <script th:replace="~{fragments/theme-head :: earlyInit}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - ComputerShop</title>
    <link rel="stylesheet" th:href="@{/CSS/style.css}" />
    <link rel="stylesheet" th:href="@{/CSS/header.css}" />
    <link rel="stylesheet" th:href="@{/CSS/footer.css}" />
    <link rel="stylesheet" th:href="@{/CSS/login.css}" />
</head>
<body>
    
    <div th:replace="~{header :: header}"></div>

    <main class="main-content">
        <div class="auth-wrapper">
            <div class="auth-header">
                <h2>Register Account</h2>
                <p class="text-muted">Create an account for the best shopping experience</p>
            </div>

            <div th:if="${error}" class="error" th:text="${error}">Registration Error</div>
            <div th:if="${success}" class="success" th:text="${success}">Successfully registered</div>

            <form th:action="@{/register}" method="post">
                <div class="form-row">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" type="text" class="form-control" placeholder="Enter username" th:value="${username}" required />
                </div>

                <div class="form-row">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <div class="form-row">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <div class="form-row">
                    <label for="address" class="form-label">Default Shipping Address</label>
                    <textarea id="address" name="address" class="form-control" placeholder="Enter your default shipping address..." rows="3" required th:text="${address}"></textarea>
                    <small class="text-muted">This address will be used by default when ordering</small>
                </div>



                <button class="btn btn-primary btn-full" type="submit">Register</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="/login">Login now</a></p>
            </div>
        </div>
    </main>

    
    <div th:replace="~{footer :: footer}"></div>

    <script th:src="@{/JavaScript/header.js}"></script>
    <script th:src="@{/JavaScript/main.js}"></script>
</body>
</html>
