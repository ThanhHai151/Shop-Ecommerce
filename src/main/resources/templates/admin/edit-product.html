<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script th:replace="~{fragments/theme-head :: earlyInit}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Computer Shop Admin</title>
    <link rel="stylesheet" th:href="@{/CSS/admin.css}">
    <link rel="stylesheet" th:href="@{/CSS/admin-product.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="admin-container">

        <nav class="admin-sidebar" id="adminSidebar">
            <div class="admin-logo">
                <h2><i class="fas fa-laptop"></i> Admin Panel</h2>
            </div>
            <ul class="admin-nav">
                <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-bar"></i> <span>Dashboard</span></a></li>
                <li><a th:href="@{/admin/users}"><i class="fas fa-users"></i> <span>Users</span></a></li>
                <li><a th:href="@{/admin/products}" class="active"><i class="fas fa-box"></i> <span>Products</span></a></li>
                <li><a th:href="@{/admin/categories}"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
                <li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a th:href="@{/}"><i class="fas fa-home"></i> <span>Home</span></a></li>
                <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
            </ul>
        </nav>

        <!-- Collapsible Sidebar Toggle -->
        <button class="sidebar-toggle" id="sidebarToggle" title="Collapse/Expand sidebar">
            <i class="fas fa-chevron-left"></i>
        </button>

        <main class="admin-main">
            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <div class="admin-header">
            <th:block th:replace="~{fragments/theme-toggle :: buttonAdmin}"></th:block>
                <h1><i class="fas fa-edit"></i> Edit Product</h1>
                <div class="admin-breadcrumb">
                    <a th:href="@{/admin/products}"><i class="fas fa-arrow-left"></i> Back to product list</a>
                </div>
            </div>

            
            <div th:if="${success}" class="admin-alert admin-alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="admin-alert admin-alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            
            <div class="admin-form-container">
                <div class="admin-form-header">
                    <h2><i class="fas fa-edit"></i> Product Information</h2>
                    <span class="admin-badge admin-badge-info">ID: <span th:text="${product.productId}"></span></span>
                </div>
                
                <form th:action="@{/admin/products/{id}/update(id=${product.productId})}" 
                      method="post" 
                      th:object="${product}" 
                      class="admin-form">
                    
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="productName"><i class="fas fa-box"></i> Product Name *</label>
                            <input type="text" 
                                   id="productName"
                                   th:field="*{productName}" 
                                   placeholder="Enter product name..." 
                                   required>
                        </div>
                        <div class="admin-form-group">
                            <label for="categoryId"><i class="fas fa-tag"></i> Category *</label>
                            <select id="categoryId" name="categoryId" required>
                                <option value="">-- Select Category --</option>
                                <option th:each="category : ${categories}" 
                                        th:value="${category.categoryId}" 
                                        th:selected="${category.categoryId == product.category?.categoryId}"
                                        th:text="${category.categoryName}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="price"><i class="fas fa-dollar-sign"></i> Price (VND) *</label>
                            <input type="number" 
                                   id="price"
                                   th:field="*{price}" 
                                   step="0.01"
                                   min="0"
                                   placeholder="0.00" 
                                   required>
                        </div>
                        <div class="admin-form-group">
                            <label for="stockQuantity"><i class="fas fa-warehouse"></i> Quantity</label>
                            <input type="number" 
                                   id="stockQuantity"
                                   th:field="*{stockQuantity}" 
                                   min="0"
                                   placeholder="0">
                            <small class="form-help">
                                Current status: 
                                <span th:if="${product.stockQuantity > 20}" class="text-success">
                                    <i class="fas fa-check-circle"></i> In stock
                                </span>
                                <span th:if="${product.stockQuantity > 0 && product.stockQuantity <= 20}" class="text-warning">
                                    <i class="fas fa-exclamation-triangle"></i> Low stock
                                </span>
                                <span th:if="${product.stockQuantity <= 0}" class="text-danger">
                                    <i class="fas fa-times-circle"></i> Out of stock
                                </span>
                            </small>
                        </div>
                    </div>

                    <div class="admin-form-group">
                        <label for="description"><i class="fas fa-align-left"></i> Description</label>
                        <textarea id="description"
                                 th:field="*{description}" 
                                 placeholder="Enter product description..." 
                                 rows="4"></textarea>
                    </div>

                    
                    <div class="admin-info-section">
                        <h3><i class="fas fa-info-circle"></i> Additional Information</h3>
                        <div class="admin-info-grid">
                            <div class="admin-info-item">
                                <label>Created At:</label>
                                <span>N/A</span>
                            </div>
                            <div class="admin-info-item">
                                <label>Current Category:</label>
                                <span th:text="${product.category?.categoryName ?: 'Uncategorized'}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="admin-form-actions">
                        <button type="submit" class="admin-btn admin-btn-success">
                            <i class="fas fa-save"></i> Update Product
                        </button>
                        <a th:href="@{/admin/products}" class="admin-btn admin-btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                        
                        
                        <form th:action="@{/admin/products/{id}/delete(id=${product.productId})}" 
                              method="post" 
                              style="display: inline-block;"
                              onsubmit="return confirm('Are you sure you want to delete this product? This action cannot be undone.')">
                            <button type="submit" class="admin-btn admin-btn-danger">
                                <i class="fas fa-trash"></i> Delete Product
                            </button>
                        </form>
                    </div>
                </form>
            </div>

            
            <div class="admin-stats-grid">
                <div class="admin-stat-card">
                    <div class="admin-stat-icon admin-stat-primary">
                        <i class="fas fa-dollar-sign"></i>
                    </div>
                    <div class="admin-stat-content">
                        <h3 th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VND'"></h3>
                        <p>Selling Price</p>
                    </div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-icon admin-stat-info">
                        <i class="fas fa-warehouse"></i>
                    </div>
                    <div class="admin-stat-content">
                        <h3 th:text="${product.stockQuantity}"></h3>
                        <p>Stock</p>
                    </div>
                </div>
                <div class="admin-stat-card">
                    <div class="admin-stat-icon admin-stat-secondary">
                        <i class="fas fa-tag"></i>
                    </div>
                    <div class="admin-stat-content">
                        <h3 th:text="${product.category?.categoryName ?: 'N/A'}"></h3>
                        <p>Category</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Auto-hide flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.admin-alert');
                alerts.forEach(alert => {
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 300);
                });
            }, 5000);
        });
    </script>
    <script th:src="@{/JavaScript/admin-sidebar.js}"></script>
    <th:block th:replace="~{fragments/admin-scripts :: themeScript}"></th:block>

</body>
</html>
