<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script th:replace="~{fragments/theme-head :: earlyInit}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Computer Shop Admin</title>
    <link rel="stylesheet" th:href="@{/CSS/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/CSS/admin-category.css}">
</head>
<body>
    <div class="admin-container">

        <nav class="admin-sidebar" id="adminSidebar">
            <div class="admin-logo">
                <h2><i class="fas fa-laptop"></i> Admin Panel</h2>
            </div>
            <ul class="admin-nav">
                <li><a th:href="@{/admin/dashboard}"><i class="fas fa-chart-bar"></i> <span>Dashboard</span></a></li>
                <li><a th:href="@{/admin/users}"><i class="fas fa-users"></i> <span>Users</span></a></li>
                <li><a th:href="@{/admin/products}"><i class="fas fa-box"></i> <span>Products</span></a></li>
                <li><a th:href="@{/admin/categories}" class="active"><i class="fas fa-tags"></i> <span>Categories</span></a></li>
                <li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a></li>
                <li><a th:href="@{/}"><i class="fas fa-home"></i> <span>Home</span></a></li>
                <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a></li>
            </ul>
        </nav>

        <!-- Collapsible Sidebar Toggle -->
        <button class="sidebar-toggle" id="sidebarToggle" title="Collapse/Expand sidebar">
            <i class="fas fa-chevron-left"></i>
        </button>

        <main class="admin-main">
            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle" id="mobileMenuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <div class="admin-header">
            <th:block th:replace="~{fragments/theme-toggle :: buttonAdmin}"></th:block>
                <h1><i class="fas fa-tags"></i> Manage Categories</h1>
                <p>Manage product categories</p>
            </div>

            
            <div th:if="${success}" class="admin-alert admin-alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="admin-alert admin-alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            
            <div class="admin-form-container">
                <div class="admin-form-header">
                    <h2><i class="fas fa-plus"></i> Add New Category</h2>
                </div>
                <form th:action="@{/admin/categories/create}" method="post" th:object="${newCategory}" class="admin-form">
                    <div class="admin-form-row">
                        <div class="admin-form-group">
                            <label for="categoryName"><i class="fas fa-tag"></i> Category Name</label>
                            <input type="text" 
                                   id="categoryName"
                                   th:field="*{categoryName}" 
                                   placeholder="Enter category name..." 
                                   required>
                        </div>
                        <div class="admin-form-group">
                            <label for="description"><i class="fas fa-align-left"></i> Description</label>
                            <textarea id="description"
                                     th:field="*{description}" 
                                     placeholder="Enter category description..." 
                                     rows="3"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="admin-btn admin-btn-primary">
                        <i class="fas fa-plus"></i> Add Category
                    </button>
                </form>
            </div>

            
            <div class="admin-table-container">
                <div class="admin-table-header">
                    <h2><i class="fas fa-list"></i> Category List</h2>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Category Name</th>
                            <th>Description</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.categoryId}"></td>
                            <td>
                                <strong th:text="${category.categoryName}"></strong>
                            </td>
                            <td th:text="${category.description ?: 'No description'}"></td>
                            <td>
                                <span th:if="${category.createdAt != null}"
                                      th:text="${#temporals.format(category.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                                <span th:if="${category.createdAt == null}">N/A</span>
                            </td>
                            <td>
                                <div class="admin-actions">
                                    
                                    <button type="button" 
                                            class="admin-btn admin-btn-info admin-btn-sm"
                                            th:onclick="|toggleEditForm(${category.categoryId})|">
                                        <i class="fas fa-edit"></i> Edit
                                    </button>
                                    
                                    
                                    <form th:action="@{/admin/categories/{id}/delete(id=${category.categoryId})}" 
                                          method="post" 
                                          style="display: inline-block;">
                                        <button type="submit" 
                                                class="admin-btn admin-btn-danger admin-btn-sm"
                                                onclick="return confirm('Are you sure you want to delete this category? This action cannot be undone.')">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </div>
                                
                                
                                <div th:id="|edit-form-${category.categoryId}|" class="admin-edit-form" style="display: none;">
                                    <form th:action="@{/admin/categories/{id}/update(id=${category.categoryId})}" method="post">
                                        <div class="admin-form-group">
                                            <label>Category Name:</label>
                                            <input type="text" 
                                                   name="categoryName" 
                                                   th:value="${category.categoryName}" 
                                                   required>
                                        </div>
                                        <div class="admin-form-group">
                                            <label>Description:</label>
                                            <textarea name="description" 
                                                     rows="2" 
                                                     th:text="${category.description}"></textarea>
                                        </div>
                                        <div class="admin-form-actions">
                                            <button type="submit" class="admin-btn admin-btn-success admin-btn-sm">
                                                <i class="fas fa-save"></i> Save
                                            </button>
                                            <button type="button" 
                                                    class="admin-btn admin-btn-secondary admin-btn-sm"
                                                    th:onclick="|toggleEditForm(${category.categoryId})|">
                                                <i class="fas fa-times"></i> Cancel
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="5" class="text-center text-muted">
                                <i class="fas fa-tags"></i> No categories found
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            
            <div class="admin-stats-grid">
                <div class="admin-stat-card">
                    <div class="admin-stat-icon admin-stat-primary">
                        <i class="fas fa-tags"></i>
                    </div>
                    <div class="admin-stat-content">
                        <h3 th:text="${#lists.size(categories)}">0</h3>
                        <p>Total Categories</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Auto-hide flash messages after 5 seconds
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const alerts = document.querySelectorAll('.admin-alert');
                alerts.forEach(alert => {
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 300);
                });
            }, 5000);
        });

        // Toggle edit form visibility
        function toggleEditForm(categoryId) {
            const editForm = document.getElementById('edit-form-' + categoryId);
            if (editForm.style.display === 'none') {
                editForm.style.display = 'block';
            } else {
                editForm.style.display = 'none';
            }
        }
    </script>
    <script th:src="@{/JavaScript/admin-sidebar.js}"></script>
    <th:block th:replace="~{fragments/admin-scripts :: themeScript}"></th:block>

</body>
</html>
